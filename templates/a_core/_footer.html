<footer class="footer mt-auto py-5"
    style="background-color: var(--bg-color); border-top: 1px solid var(--border-color);">
    <div class="container">
        <div class="row align-items-center">
            <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
                <a href="/" class="text-decoration-none fw-bold tracking-tight"
                    style="color: var(--text-primary); font-family: 'Outfit', sans-serif;">
                    Ricardo Webley
                </a>
                <p class="small mb-0 mt-2" style="color: var(--text-secondary);">
                    © {% now "Y" %} All rights reserved.
                </p>
            </div>

            <div class="col-md-4 text-center mb-3 mb-md-0">
                <ul class="list-inline mb-0 flex-wrap d-flex justify-content-center">
                    <li class="list-inline-item mx-2"><a href="{% url 'projects' %}"
                            class="text-decoration-none small footer-link"
                            style="color: var(--text-secondary);">Portfolio</a></li>
                    <li class="list-inline-item mx-2"><a href="{% url 'projects' %}"
                            class="text-decoration-none small footer-link"
                            style="color: var(--text-secondary);">Projects</a></li>
                    <li class="list-inline-item mx-2"><a href="{% url 'contact' %}"
                            class="text-decoration-none small footer-link"
                            style="color: var(--text-secondary);">Contact</a></li>
                </ul>
            </div>

            <div class="col-md-4 text-center text-md-end">
                <a href="#" class="ms-3 footer-icon" style="color: var(--text-secondary);"><i
                        class="bi bi-github"></i></a>
                <a href="#" class="ms-3 footer-icon" style="color: var(--text-secondary);"><i
                        class="bi bi-linkedin"></i></a>
                <a href="#" class="ms-3 footer-icon" style="color: var(--text-secondary);"><i
                        class="bi bi-twitter-x"></i></a>
            </div>
        </div>
    </div>
</footer>

<style>
    .footer {
        letter-spacing: -0.01em;
    }

    .footer-link {
        transition: color 0.3s ease;
        font-weight: 500;
    }

    .footer-link:hover {
        color: var(--text-primary) !important;
    }

    .footer-icon {
        font-size: 1.2rem;
        transition: transform 0.3s ease, color 0.3s ease;
        display: inline-block;
    }

    .footer-icon:hover {
        transform: translateY(-3px);
        color: var(--text-primary) !important;
    }

    .tracking-tight {
        letter-spacing: -0.5px;
    }
</style>
