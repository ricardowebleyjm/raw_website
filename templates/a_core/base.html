{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>{% block title %}Professional Site{% endblock %}</title>
    <meta name="description" content="{% block description %}High-performance enterprise solutions and software development.{% endblock %}">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ request.build_absolute_uri }}">

    <meta property="og:title" content="{% block og_title %}Professional Site{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Enterprise-grade software architecture and development.{% endblock %}">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .skip-link { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }
        .skip-link:focus { position: static; width: auto; height: auto; }
        .nav-link {transition: color 0.2s ease-in-out;}
        .nav-link:hover {color: var(--bs-primary) !important;}
        .navbar-brand:hover {opacity: 0.8;}
        .nav-link:hover { color: #0f0f0f; background: #f4f4f5; }
        .nav-divider {width: 1px; height: 18px; background: #e5e7eb; margin: 0 8px;}
        .nav-cta:hover { background: #2563eb; transform: translateY(-1px); }
    </style>
    
    {% block extra_head %}{% endblock %}
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header>
        {% include 'a_core/_navbar.html' %}
    </header>

    <main id="main-content" class="container py-5">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="py-3 my-4 border-top">
        <p class="text-center text-body-secondary">© {% now "Y" %} Ricardo Webley</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
